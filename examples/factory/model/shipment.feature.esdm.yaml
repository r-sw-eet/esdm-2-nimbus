# Given-When-Then behavioral specs for the factory `shipment` aggregate.
# `then` events OMIT the codegen-set `status` field (set from the event default).
apiVersion: schema.esdm.io/given-when-then/v1
kind: feature
name: shipment-lifecycle
scope:
  domain: factory
  boundedContext: warehouse
  aggregate: shipment
scenarios:
  - name: create-a-shipment
    when:
      command: create-shipment
      data: { inspectionId: "f0000000-0000-0000-0000-000000000003" }
    then:
      events:
        # status (default 'created') is set by the command, not declared here.
        - event: shipment-created
          data: { id: "f0000000-0000-0000-0000-000000000004", inspectionId: "f0000000-0000-0000-0000-000000000003" }

  - name: pack-a-created-shipment
    given:
      - event: shipment-created
        data: { id: "f0000000-0000-0000-0000-000000000004", inspectionId: "f0000000-0000-0000-0000-000000000003" }
    when:
      command: pack-shipment
      data: { id: "f0000000-0000-0000-0000-000000000004", weight: 8.2 }
    then:
      events:
        - event: shipment-packed
          data: { id: "f0000000-0000-0000-0000-000000000004", weight: 8.2 }

  - name: ship-a-packed-shipment
    given:
      - event: shipment-created
        data: { id: "f0000000-0000-0000-0000-000000000004", inspectionId: "f0000000-0000-0000-0000-000000000003" }
      - event: shipment-packed
        data: { id: "f0000000-0000-0000-0000-000000000004", weight: 8.2 }
    when:
      command: ship-shipment
      data: { id: "f0000000-0000-0000-0000-000000000004" }
    then:
      events:
        - event: shipment-shipped
          data: { id: "f0000000-0000-0000-0000-000000000004" }

  # State-machine `from` guard: ship-shipment admits only from `packed`.
  - name: reject-shipping-an-unpacked-shipment
    given:
      - event: shipment-created
        data: { id: "f0000000-0000-0000-0000-000000000004", inspectionId: "f0000000-0000-0000-0000-000000000003" }
    when:
      command: ship-shipment
      data: { id: "f0000000-0000-0000-0000-000000000004" }
    then:
      rejection: { reason: an unpacked shipment cannot be shipped }

  # FEEL guard: ship-shipment admits `when weight > 0`; here weight is 0.
  - name: reject-shipping-a-weightless-shipment
    given:
      - event: shipment-created
        data: { id: "f0000000-0000-0000-0000-000000000004", inspectionId: "f0000000-0000-0000-0000-000000000003" }
      - event: shipment-packed
        data: { id: "f0000000-0000-0000-0000-000000000004", weight: 0 }
    when:
      command: ship-shipment
      data: { id: "f0000000-0000-0000-0000-000000000004" }
    then:
      rejection: { reason: a shipment with no weight cannot be shipped }
